<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo 清单</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%232f7d57'/%3E%3Cpath d='M18 33l9 9 19-22' fill='none' stroke='white' stroke-width='7' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-labelledby="app-title">
      <section class="hero">
        <div>
          <p class="date" id="todayLabel"></p>
          <h1 id="app-title">今日任务</h1>
        </div>
        <div class="progress" aria-live="polite">
          <span id="doneCount">0</span>
          <small>已完成</small>
        </div>
      </section>

      <form class="todo-form" id="todoForm">
        <label class="sr-only" for="todoInput">添加任务</label>
        <input
          id="todoInput"
          type="text"
          autocomplete="off"
          maxlength="80"
          placeholder="输入一个新任务"
          required
        />
        <button type="submit" aria-label="添加任务">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 5v14M5 12h14" />
          </svg>
        </button>
      </form>

      <section class="toolbar" aria-label="任务筛选">
        <div class="filters" role="tablist" aria-label="筛选任务">
          <button class="filter active" type="button" data-filter="all">全部</button>
          <button class="filter" type="button" data-filter="active">待办</button>
          <button class="filter" type="button" data-filter="completed">完成</button>
        </div>
        <button class="clear" id="clearCompleted" type="button">清除完成</button>
      </section>

      <ul class="todo-list" id="todoList" aria-label="任务列表"></ul>

      <section class="empty" id="emptyState" hidden>
        <div class="empty-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M7 11.5 10.2 15 17 8" />
            <path d="M5 4h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z" />
          </svg>
        </div>
        <h2>没有任务</h2>
        <p>添加一条任务开始安排今天。</p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
